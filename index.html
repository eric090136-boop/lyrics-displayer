<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 歌回字幕助手 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; }

        /* 字幕顯示區：固定在底層，不隨 UI 變動移動 */
        #subtitle-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* 穿透點擊，不影響操作 */
            transition: background-color 0.3s ease;
        }

        .subtitle-text {
            text-shadow: 
                -4px -4px 0 #000, 4px -4px 0 #000, 
                -4px  4px 0 #000, 4px  4px 0 #000,
                0px 0px 20px rgba(0,0,0,0.8);
            line-height: 1.4;
            font-weight: 900;
            text-align: center;
        }

        /* 控制面板：右側懸浮抽屜 */
        #control-panel {
            position: fixed;
            top: 1rem;
            right: 1rem;
            bottom: 1rem;
            width: 380px;
            z-index: 50;
            background: rgba(31, 41, 55, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .panel-hidden {
            transform: translateX(calc(100% + 2rem));
            opacity: 0;
        }

        /* 隱藏 YouTube 實體 */
        #yt-player-container {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* 自定義滑桿樣式 */
        input[type=range] { -webkit-appearance: none; background: #374151; border-radius: 999px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #6366f1; cursor: pointer; border: 2px solid white; }

        /* OBS 專用樣式：當檢測到 OBS 參數或按下隱藏按鈕時 */
        .obs-mode #control-panel, .obs-mode #toggle-btn { display: none !important; }
    </style>
</head>
<body class="bg-black overflow-hidden">

    <div id="subtitle-layer" class="bg-[#00FF00]">
        <div id="subtitleText" class="subtitle-text text-white px-8" style="font-size: 72px;">
            等待載入設定...
        </div>
    </div>

    <div id="yt-player-container">
        <div id="player"></div>
    </div>

    <button id="toggle-btn" class="fixed top-6 right-6 z-[60] p-3 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
        </svg>
    </button>

    <div id="control-panel" class="text-gray-100">
        <div class="p-6 flex-1 overflow-y-auto space-y-6">
            <div class="flex items-center justify-between border-b border-gray-700 pb-4">
                <h2 class="text-xl font-bold text-indigo-400">控制台</h2>
                <span id="status-tag" class="text-[10px] px-2 py-1 bg-gray-700 rounded-md">API 載入中</span>
            </div>

            <div class="space-y-3">
                <label class="text-sm font-semibold text-gray-400">YouTube 網址</label>
                <div class="flex gap-2">
                    <input type="text" id="ytUrl" placeholder="https://..." class="flex-1 bg-gray-800 border border-gray-600 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button id="btnLoadVideo" class="px-4 bg-indigo-600 rounded-lg text-sm font-bold hover:bg-indigo-700">載入</button>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold text-gray-400">歌詞/字幕</label>
                    <button id="btnFetchCC" class="text-xs text-indigo-400 hover:underline">嘗試抓取 CC</button>
                </div>
                <div id="cc-selector" class="hidden">
                    <select id="trackSelect" class="w-full bg-gray-800 border border-indigo-500 rounded-lg p-2 text-xs"></select>
                </div>
                <textarea id="manualText" rows="4" placeholder="貼入 LRC 或 SRT 字幕內容..." class="w-full bg-gray-800 border border-gray-600 rounded-lg p-2 text-xs font-mono outline-none focus:ring-2 focus:ring-purple-500"></textarea>
                <button id="btnApplyLyrics" class="w-full py-2 bg-purple-600 rounded-lg text-sm font-bold hover:bg-purple-700 transition">應用歌詞</button>
            </div>

            <div class="bg-gray-800/50 p-4 rounded-xl space-y-4">
                <div class="flex justify-between items-baseline font-mono">
                    <span id="currentTime" class="text-lg text-indigo-300">00:00</span>
                    <span id="totalTime" class="text-xs text-gray-500">/ 00:00</span>
                </div>
                <input type="range" id="progressSlider" min="0" value="0" step="0.1" class="w-full h-1.5">
                <div class="grid grid-cols-3 gap-2">
                    <button id="btnPlay" class="p-2 bg-emerald-600 rounded-md text-xs hover:bg-emerald-700 font-bold">播放</button>
                    <button id="btnPause" class="p-2 bg-amber-600 rounded-md text-xs hover:bg-amber-700 font-bold">暫停</button>
                    <button id="btnReset" class="p-2 bg-rose-600 rounded-md text-xs hover:bg-rose-700 font-bold">重置</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs text-gray-400">字體大小 (px)</label>
                    <input type="number" id="fontSize" value="72" class="w-full bg-gray-800 rounded-lg p-2 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-xs text-gray-400">色鍵底色</label>
                    <select id="bgColor" class="w-full bg-gray-800 rounded-lg p-2 text-sm">
                        <option value="#00FF00">綠色幕</option>
                        <option value="#0000FF">藍色幕</option>
                        <option value="#000000">黑色幕</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs text-gray-400">音量</label>
                <div class="flex items-center gap-3">
                    <input type="range" id="volumeSlider" min="0" max="100" value="50" class="flex-1">
                    <span id="volumeVal" class="text-xs font-mono w-8">50%</span>
                </div>
            </div>
        </div>

        <div class="p-4 bg-gray-900/50">
            <button id="enterObsMode" class="w-full py-3 bg-white text-gray-900 rounded-xl font-bold hover:bg-gray-200 transition active:scale-95">
                隱藏面板 (Esc 恢復)
            </button>
        </div>
    </div>

    <script>
        // --- 1. 初始化變數 ---
        let player = null;
        let subtitles = [];
        let syncTimer = null;
        let isDragging = false;

        // --- 2. YouTube API 核心載入 (修正載入失敗問題) ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            setStatus("API 就緒", "text-emerald-400");
            // API 就緒後才綁定載入按鈕，避免 null 錯誤
            document.getElementById('btnLoadVideo').addEventListener('click', loadVideo);
        };

        function loadVideo() {
            const url = document.getElementById('ytUrl').value;
            const videoId = extractVideoId(url);
            if (!videoId) return alert("請輸入正確的 YouTube ID 或網址");

            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('player', {
                    videoId: videoId,
                    playerVars: { 
                        'playsinline': 1,
                        'origin': window.location.origin
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange
                    }
                });
            }
        }

        function onPlayerReady(event) {
            setStatus("影片載入成功", "text-indigo-400");
            event.target.setVolume(document.getElementById('volumeSlider').value);
            updateTimeInfo();
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                startSync();
                updateTimeInfo();
            } else {
                stopSync();
            }
        }

        // --- 3. 同步與歌詞處理 ---
        function startSync() {
            stopSync();
            syncTimer = setInterval(() => {
                if (!player || isDragging || typeof player.getCurrentTime !== 'function') return;
                const now = player.getCurrentTime();
                
                // 更新進度條
                const slider = document.getElementById('progressSlider');
                slider.value = now;
                document.getElementById('currentTime').innerText = formatTime(now);

                // 更新歌詞
                const cur = subtitles.find(s => now >= s.start && now <= s.end);
                document.getElementById('subtitleText').innerHTML = cur ? cur.text : "";
            }, 100);
        }

        function stopSync() { clearInterval(syncTimer); }

        function applyLyrics() {
            const raw = document.getElementById('manualText').value;
            if (!raw.trim()) return alert("內容不可為空");
            
            subtitles = raw.includes('[') ? parseLRC(raw) : parseSRT(raw);
            if (subtitles.length > 0) {
                alert(`已應用 ${subtitles.length} 行歌詞`);
            } else {
                alert("解析失敗，請確認格式");
            }
        }

        // --- 4. 解析器與工具 ---
        function parseLRC(lrc) {
            const res = [];
            lrc.split('\n').forEach(line => {
                const parts = line.split(']');
                const text = parts.pop().trim();
                const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                if (match) {
                    const s = parseInt(match[1])*60 + parseInt(match[2]) + parseInt(match[3])/(match[3].length===3?1000:100);
                    res.push({ start: s, end: s + 4, text: text });
                }
            });
            res.sort((a,b) => a.start - b.start);
            for(let i=0; i<res.length-1; i++) res[i].end = res[i+1].start;
            return res;
        }

        function parseSRT(srt) {
            let res = []; let m;
            const regex = /(\d+)\n(\d{2}:\d{2}:\d{2}[,\.]\d{3}) --> (\d{2}:\d{2}:\d{2}[,\.]\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
            while ((m = regex.exec(srt.replace(/\r/g, ""))) !== null) {
                res.push({ 
                    start: timeToSec(m[2]), 
                    end: timeToSec(m[3]), 
                    text: m[4].replace(/\n/g, "<br>") 
                });
            }
            return res;
        }

        function timeToSec(t) {
            const p = t.replace(',', '.').split(':');
            return parseFloat(p[0]) * 3600 + parseFloat(p[1]) * 60 + parseFloat(p[2]);
        }

        function extractVideoId(url) {
            const match = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function updateTimeInfo() {
            if (player && player.getDuration) {
                const total = player.getDuration();
                document.getElementById('totalTime').innerText = "/ " + formatTime(total);
                document.getElementById('progressSlider').max = total;
            }
        }

        function setStatus(text, colorClass) {
            const tag = document.getElementById('status-tag');
            tag.innerText = text;
            tag.className = `text-[10px] px-2 py-1 bg-gray-700 rounded-md ${colorClass}`;
        }

        // --- 5. 事件監聽綁定 ---
        document.getElementById('toggle-btn').onclick = () => {
            document.getElementById('control-panel').classList.toggle('panel-hidden');
        };

        document.getElementById('btnPlay').onclick = () => player?.playVideo();
        document.getElementById('btnPause').onclick = () => player?.pauseVideo();
        document.getElementById('btnReset').onclick = () => { player?.seekTo(0); player?.pauseVideo(); };
        document.getElementById('btnApplyLyrics').onclick = applyLyrics;

        document.getElementById('volumeSlider').oninput = (e) => {
            player?.setVolume(e.target.value);
            document.getElementById('volumeVal').innerText = e.target.value + "%";
        };

        document.getElementById('progressSlider').onmousedown = () => isDragging = true;
        document.getElementById('progressSlider').onmouseup = () => {
            isDragging = false;
            player?.seekTo(document.getElementById('progressSlider').value);
        };

        document.getElementById('bgColor').onchange = (e) => {
            document.getElementById('subtitle-layer').style.backgroundColor = e.target.value;
        };

        document.getElementById('fontSize').oninput = (e) => {
            document.getElementById('subtitleText').style.fontSize = e.target.value + 'px';
        };

        document.getElementById('enterObsMode').onclick = () => {
            document.body.classList.add('obs-mode');
        };

        window.onkeydown = (e) => {
            if (e.key === "Escape") document.body.classList.remove('obs-mode');
        };

        // 自動抓取 CC 邏輯 (維持 Proxy 方案)
        document.getElementById('btnFetchCC').onclick = async () => {
            const videoId = extractVideoId(document.getElementById('ytUrl').value);
            if (!videoId) return alert("請先填入網址");
            try {
                setStatus("抓取清單中...", "text-yellow-400");
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.youtube.com/api/timedtext?v=${videoId}&type=list`)}`;
                const res = await fetch(proxy);
                const data = await res.json();
                const xml = new DOMParser().parseFromString(data.contents, "text/xml");
                const tracks = xml.getElementsByTagName('track');
                if (tracks.length === 0) throw new Error("影片未開啟 CC");
                
                const select = document.getElementById('trackSelect');
                select.innerHTML = "";
                Array.from(tracks).forEach(t => select.add(new Option(t.getAttribute('lang_original'), t.getAttribute('lang_code'))));
                document.getElementById('cc-selector').classList.remove('hidden');
                
                // 載入第一個語言
                fetchDetailedCC(videoId, tracks[0].getAttribute('lang_code'));
            } catch (e) { alert(e.message); setStatus("抓取失敗", "text-rose-400"); }
        };

        async function fetchDetailedCC(vId, lang) {
            const subUrl = `https://www.youtube.com/api/timedtext?v=${vId}&lang=${lang}&fmt=srv3`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(subUrl)}`;
            const res = await fetch(proxy);
            const data = await res.json();
            const xml = new DOMParser().parseFromString(data.contents, "text/xml");
            const p = xml.getElementsByTagName('p');
            subtitles = Array.from(p).map(n => ({
                start: parseInt(n.getAttribute('t')) / 1000,
                end: (parseInt(n.getAttribute('t')) + (parseInt(n.getAttribute('d')) || 2000)) / 1000,
                text: n.textContent
            }));
            setStatus("CC 載入完成", "text-emerald-400");
        }
    </script>
</body>
</html>
