<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 歌詞助手 - 穩定物理隔離版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; /* 禁止全域捲動，防止視窗擷取偏移 */
            background-color: #1a1a1a;
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* --------------------------------------------------
           左側：OBS 擷取區 (穩定輸出)
           -------------------------------------------------- */
        #live-output-zone {
            width: 70%; /* 物理固定寬度 */
            height: 100vh;
            position: relative;
            background-color: #00FF00; /* 預設綠幕 */
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #333; /* 輔助線：協助 OBS 抓取邊界 */
        }

        .subtitle-text {
            color: white;
            text-align: center;
            font-weight: 900;
            text-shadow: 
                -4px -4px 0 #000, 4px -4px 0 #000, 
                -4px  4px 0 #000, 4px  4px 0 #000,
                0px 0px 25px rgba(0,0,0,0.8);
            line-height: 1.2;
            width: 90%;
            word-wrap: break-word;
            pointer-events: none;
        }

        /* --------------------------------------------------
           右側：操作控制台
           -------------------------------------------------- */
        #control-dashboard {
            width: 30%;
            height: 100vh;
            background: #262626;
            color: #e5e5e5;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .scroll-container {
            padding: 24px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        /* 隱藏 YouTube 播放器 */
        #yt-api-host { position: absolute; width: 1px; height: 1px; opacity: 0; }
        
        input[type=range] { -webkit-appearance: none; background: #404040; height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #6366f1; cursor: pointer; border: 2px solid #fff; }
    </style>
</head>
<body class="flex">

    <div id="live-output-zone">
        <div id="display-text" class="subtitle-text" style="font-size: 72px;">
            等待載入...
        </div>
        <div class="absolute top-2 left-2 text-[10px] text-black/20 font-bold uppercase pointer-events-none">
            OBS Capture Area (70%)
        </div>
    </div>

    <div id="yt-api-host"><div id="player"></div></div>

    <div id="control-dashboard">
        <div class="p-4 border-b border-white/10 flex justify-between items-center bg-black/20">
            <h2 class="font-bold text-indigo-400">歌回控制台</h2>
            <div id="api-status" class="text-[9px] px-2 py-0.5 rounded bg-gray-700 text-gray-400">WAITING</div>
        </div>

        <div class="scroll-container space-y-6">
            <section class="space-y-2">
                <label class="text-[11px] font-bold text-gray-500 uppercase">YouTube 網址</label>
                <div class="flex gap-1">
                    <input type="text" id="yt-url" placeholder="Paste URL/ID" class="flex-1 bg-neutral-800 border border-neutral-700 rounded p-2 text-xs outline-none focus:border-indigo-500">
                    <button id="btn-load-yt" class="bg-indigo-600 px-3 py-2 rounded text-xs font-bold hover:bg-indigo-700">載入</button>
                </div>
            </section>

            <section class="space-y-2">
                <div class="flex justify-between">
                    <label class="text-[11px] font-bold text-gray-500 uppercase">歌詞內容</label>
                    <button id="btn-auto-cc" class="text-[10px] text-indigo-400 hover:underline">自動抓取 CC</button>
                </div>
                <div id="cc-track-box" class="hidden">
                    <select id="cc-track-select" class="w-full bg-neutral-800 border border-indigo-900 rounded p-1 text-xs mb-2"></select>
                </div>
                <textarea id="manual-input" rows="5" placeholder="貼入 LRC 或 SRT 字幕..." class="w-full bg-neutral-800 border border-neutral-700 rounded p-2 text-xs font-mono outline-none focus:border-purple-500"></textarea>
                <button id="btn-apply" class="w-full py-2 bg-purple-600 rounded font-bold text-xs hover:bg-purple-700 transition">應用歌詞 (Apply)</button>
            </section>

            <section class="bg-black/20 p-4 rounded-lg space-y-3">
                <div class="flex justify-between items-baseline">
                    <span id="time-now" class="text-xl font-mono font-bold text-indigo-400">00:00</span>
                    <span id="time-all" class="text-xs font-mono text-neutral-600">/ 00:00</span>
                </div>
                <input type="range" id="seek-bar" min="0" value="0" step="0.1" class="w-full">
                <div class="grid grid-cols-3 gap-1">
                    <button id="btn-play" class="py-2 bg-emerald-600/10 text-emerald-500 border border-emerald-600/30 rounded text-xs font-bold hover:bg-emerald-600 hover:text-white">播放</button>
                    <button id="btn-pause" class="py-2 bg-amber-600/10 text-amber-500 border border-amber-600/30 rounded text-xs font-bold hover:bg-amber-600 hover:text-white">暫停</button>
                    <button id="btn-reset" class="py-2 bg-rose-600/10 text-rose-500 border border-rose-600/30 rounded text-xs font-bold hover:bg-rose-600 hover:text-white">重置</button>
                </div>
            </section>

            <section class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-bold uppercase">字體大小</label>
                    <input type="number" id="font-size-val" value="80" class="w-full bg-neutral-800 rounded p-2 text-xs">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-bold uppercase">去背底色</label>
                    <select id="bg-color-val" class="w-full bg-neutral-800 rounded p-2 text-xs">
                        <option value="#00FF00">綠幕 (Green)</option>
                        <option value="#0000FF">藍幕 (Blue)</option>
                        <option value="#000000">黑色 (Black)</option>
                    </select>
                </div>
            </section>

            <section class="space-y-1">
                <div class="flex justify-between text-[10px] font-bold text-gray-500">
                    <span>音量控制</span>
                    <span id="vol-txt">50%</span>
                </div>
                <input type="range" id="vol-bar" min="0" max="100" value="50" class="w-full">
            </section>
        </div>

        <div class="p-4 bg-black/40 text-[10px] text-neutral-500 leading-tight">
            ※ OBS 設定提示：<br>
            1. 使用「視窗擷取」。<br>
            2. 按住 Alt 鍵拖動紅邊，裁剪掉右側控制台。<br>
            3. 左側輸出區域永遠固定，操作控制台不會造成偏移。
        </div>
    </div>

    <script>
        let ytPlayer = null;
        let subtitleLines = [];
        let syncWorker = null;
        let isSeeking = false;

        // --- 1. YouTube API 載入 ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            const status = document.getElementById('api-status');
            status.innerText = "READY";
            status.className = "text-[9px] px-2 py-0.5 rounded bg-emerald-900/50 text-emerald-400 font-bold";
        };

        // --- 2. 影片載入邏輯 ---
        document.getElementById('btn-load-yt').onclick = () => {
            const urlInput = document.getElementById('yt-url').value;
            const vId = extractID(urlInput);
            if (!vId) return alert("無法解析影片 ID");

            if (ytPlayer) {
                ytPlayer.loadVideoById(vId);
            } else {
                ytPlayer = new YT.Player('player', {
                    videoId: vId,
                    playerVars: { 'origin': location.origin, 'playsinline': 1 },
                    events: {
                        'onReady': (e) => {
                            e.target.setVolume(document.getElementById('vol-bar').value);
                            updateTotalTime();
                        },
                        'onStateChange': (e) => {
                            if (e.data == YT.PlayerState.PLAYING) {
                                startSync();
                                updateTotalTime();
                            } else { stopSync(); }
                        }
                    }
                });
            }
        };

        // --- 3. 歌詞解析 (LRC/SRT) ---
        document.getElementById('btn-apply').onclick = () => {
            const raw = document.getElementById('manual-input').value;
            if (!raw.trim()) return;
            subtitleLines = raw.includes('[') ? parseLRC(raw) : parseSRT(raw);
            if (subtitleLines.length > 0) alert(`已載入 ${subtitleLines.length} 行歌詞`);
        };

        // 自動抓取 (Proxy)
        document.getElementById('btn-auto-cc').onclick = async () => {
            const vId = extractID(document.getElementById('yt-url').value);
            if (!vId) return alert("請先輸入網址");
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.youtube.com/api/timedtext?v=${vId}&type=list`)}`);
                const data = await res.json();
                const xml = new DOMParser().parseFromString(data.contents, "text/xml");
                const tracks = xml.getElementsByTagName('track');
                if (tracks.length === 0) throw new Error("無 CC 字幕");
                
                const select = document.getElementById('cc-track-select');
                select.innerHTML = "";
                Array.from(tracks).forEach(t => select.add(new Option(t.getAttribute('lang_original'), t.getAttribute('lang_code'))));
                document.getElementById('cc-track-box').classList.remove('hidden');
                
                fetchCCContent(vId, tracks[0].getAttribute('lang_code'));
            } catch (e) { alert("自動抓取失敗，請手動貼入。"); }
        };

        async function fetchCCContent(vId, lang) {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.youtube.com/api/timedtext?v=${vId}&lang=${lang}&fmt=srv3`)}`);
            const data = await res.json();
            const xml = new DOMParser().parseFromString(data.contents, "text/xml");
            const p = xml.getElementsByTagName('p');
            subtitleLines = Array.from(p).map(n => ({
                start: parseInt(n.getAttribute('t')) / 1000,
                end: (parseInt(n.getAttribute('t')) + (parseInt(n.getAttribute('d')) || 2000)) / 1000,
                text: n.textContent
            }));
            alert("CC 字幕抓取成功");
        }

        // --- 4. 同步與 UI ---
        function startSync() {
            clearInterval(syncWorker);
            syncWorker = setInterval(() => {
                if (!ytPlayer || isSeeking || typeof ytPlayer.getCurrentTime !== 'function') return;
                const time = ytPlayer.getCurrentTime();
                document.getElementById('seek-bar').value = time;
                document.getElementById('time-now').innerText = fmt(time);
                const cur = subtitleLines.find(s => time >= s.start && time <= s.end);
                document.getElementById('display-text').innerHTML = cur ? cur.text : "";
            }, 100);
        }

        function stopSync() { clearInterval(syncWorker); }
        function fmt(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        function extractID(u) { const m = u.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); return (m && m[2].length === 11) ? m[2] : u; }
        
        function parseLRC(lrc) {
            const res = [];
            lrc.split('\n').forEach(line => {
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                if (m) {
                    const s = parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/(m[3].length===3?1000:100);
                    res.push({start: s, end: s + 4, text: line.split(']').pop().trim()});
                }
            });
            res.sort((a,b)=>a.start-b.start);
            for(let i=0; i<res.length-1; i++) res[i].end = res[i+1].start;
            return res;
        }

        function parseSRT(srt) {
            const regex = /(\d+)\n(\d{2}:\d{2}:\d{2}[,\.]\d{3}) --> (\d{2}:\d{2}:\d{2}[,\.]\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
            let res = []; let m;
            while ((m = regex.exec(srt.replace(/\r/g, ""))) !== null) {
                res.push({ start: s2s(m[2]), end: s2s(m[3]), text: m[4].replace(/\n/g, "<br>") });
            }
            return res;
        }
        function s2s(t) { const p = t.replace(',', '.').split(':'); return parseFloat(p[0]) * 3600 + parseFloat(p[1]) * 60 + parseFloat(p[2]); }

        function updateTotalTime() {
            if (ytPlayer && ytPlayer.getDuration) {
                const d = ytPlayer.getDuration();
                document.getElementById('time-all').innerText = "/ " + fmt(d);
                document.getElementById('seek-bar').max = d;
            }
        }

        // --- 5. 事件綁定 ---
        document.getElementById('btn-play').onclick = () => ytPlayer?.playVideo();
        document.getElementById('btn-pause').onclick = () => ytPlayer?.pauseVideo();
        document.getElementById('btn-reset').onclick = () => { ytPlayer?.seekTo(0); ytPlayer?.pauseVideo(); };
        
        document.getElementById('seek-bar').onmousedown = () => isSeeking = true;
        document.getElementById('seek-bar').onmouseup = () => { isSeeking = false; ytPlayer?.seekTo(document.getElementById('seek-bar').value); };
        
        document.getElementById('vol-bar').oninput = (e) => {
            ytPlayer?.setVolume(e.target.value);
            document.getElementById('vol-txt').innerText = e.target.value + "%";
        };

        document.getElementById('font-size-val').oninput = (e) => document.getElementById('display-text').style.fontSize = e.target.value + 'px';
        document.getElementById('bg-color-val').onchange = (e) => document.getElementById('live-output-zone').style.backgroundColor = e.target.value;
    </script>
</body>
</html>
