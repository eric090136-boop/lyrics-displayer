<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS YouTube 字幕自動抓取器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .obs-mode .control-panel { display: none; }
        .obs-mode .subtitle-display { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .subtitle-text {
            text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 5px 5px 15px rgba(0,0,0,0.9);
            line-height: 1.2;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }
        #player-container { position: absolute; width: 1px; height: 1px; opacity: 0; }
        .loading-spinner { border-top-color: #6366f1; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body id="mainBody" class="bg-[#00FF00] transition-colors duration-500 overflow-hidden">

    <div id="player-container"></div>

    <div class="control-panel p-6 bg-white/95 shadow-2xl m-4 rounded-2xl border border-gray-200 sticky top-0 z-50 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">🎙️ 歌回/直播 CC 字幕助手</h1>
            <div id="statusTag" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-500">API 未就緒</div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">YouTube 影片連結</label>
                    <div class="flex gap-2 mt-1">
                        <input type="text" id="ytUrl" placeholder="貼上網址，例如: https://www.youtube.com/watch?v=..." class="flex-1 rounded-lg border-gray-300 border p-2 text-sm shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none">
                        <button id="btnFetch" class="px-6 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700 transition flex items-center shadow-lg">
                            <span id="btnText">抓取字幕</span>
                        </button>
                    </div>
                </div>

                <div id="trackSelectorArea" class="hidden">
                    <label class="block text-sm font-bold text-gray-700">選擇字幕語言</label>
                    <select id="trackSelect" class="mt-1 block w-full rounded-lg border-gray-300 border p-2 bg-gray-50 text-sm focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"></select>
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700">字體大小 (px)</label>
                        <input type="number" id="fontSize" value="80" class="mt-1 block w-full rounded-lg border-gray-300 border p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700">色鍵背景</label>
                        <select id="bgColor" class="mt-1 block w-full rounded-lg border-gray-300 border p-2 text-sm">
                            <option value="#00FF00">綠幕 (Green)</option>
                            <option value="#0000FF">藍幕 (Blue)</option>
                            <option value="#000000">黑色 (Black)</option>
                        </select>
                    </div>
                </div>
                
                <button id="toggleOBS" class="w-full py-3 bg-gray-900 text-white rounded-xl font-black hover:bg-black transition-all transform hover:scale-[1.02] shadow-xl">
                    進入 OBS 擷取模式 (Esc 退出)
                </button>
            </div>
        </div>
    </div>

    <div class="subtitle-display flex items-center justify-center min-h-[60vh] px-12 text-center">
        <div id="subtitleText" class="subtitle-text font-black text-white" style="font-size: 80px;">
            請輸入網址並點擊抓取
        </div>
    </div>

    <script>
        let subtitles = [];
        let player;
        let syncInterval;

        // 1. 載入 YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            updateStatus("API 已就緒", "bg-blue-100", "text-blue-600");
        }

        // 2. 抓取 YouTube 字幕核心邏輯
        document.getElementById('btnFetch').onclick = async () => {
            const url = document.getElementById('ytUrl').value;
            const videoId = extractVideoId(url);
            if (!videoId) return alert("請輸入有效的 YouTube 網址");

            setBtnLoading(true);
            try {
                // 使用官方 timedtext 介面的 metadata 代理 (這是一個不需要 API Key 的技巧)
                const metaUrl = `https://www.youtube.com/api/timedtext?v=${videoId}&type=list`;
                // 注意：在瀏覽器直接 fetch 會被 CORS 擋住，這裡我們使用一個公開的 Proxy 服務
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(metaUrl)}`;
                
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const tracks = xmlDoc.getElementsByTagName('track');

                if (tracks.length === 0) throw new Error("此影片沒有 CC 字幕");

                const trackSelect = document.getElementById('trackSelect');
                trackSelect.innerHTML = "";
                Array.from(tracks).forEach(track => {
                    const langCode = track.getAttribute('lang_code');
                    const langName = track.getAttribute('lang_original');
                    const option = new Option(`${langName} (${langCode})`, langCode);
                    trackSelect.add(option);
                });

                document.getElementById('trackSelectorArea').classList.remove('hidden');
                
                // 預選第一個並載入
                loadSubtitleTrack(videoId, tracks[0].getAttribute('lang_code'));
                initPlayer(videoId);

            } catch (err) {
                alert(err.message);
            } finally {
                setBtnLoading(false);
            }
        };

        // 載入具體字幕內容
        async function loadSubtitleTrack(videoId, lang) {
            updateStatus("正在下載字幕...", "bg-yellow-100", "text-yellow-600");
            const subUrl = `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${lang}&fmt=srv3`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(subUrl)}`;
            
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data.contents, "text/xml");
            const paragraphs = xmlDoc.getElementsByTagName('p');

            subtitles = Array.from(paragraphs).map(p => ({
                start: parseInt(p.getAttribute('t')) / 1000,
                end: (parseInt(p.getAttribute('t')) + (parseInt(p.getAttribute('d')) || 2000)) / 1000,
                text: p.textContent
            }));

            updateStatus("字幕已同步", "bg-green-100", "text-green-600");
        }

        document.getElementById('trackSelect').onchange = (e) => {
            const videoId = extractVideoId(document.getElementById('ytUrl').value);
            loadSubtitleTrack(videoId, e.target.value);
        };

        // 3. YouTube 播放器同步
        function initPlayer(videoId) {
            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('player-container', {
                    videoId: videoId,
                    events: {
                        'onStateChange': (e) => {
                            if (e.data == YT.PlayerState.PLAYING) startSync();
                            else stopSync();
                        }
                    }
                });
            }
        }

        function startSync() {
            clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                const time = player.getCurrentTime();
                const currentSub = subtitles.find(s => time >= s.start && time <= s.end);
                document.getElementById('subtitleText').innerHTML = currentSub ? currentSub.text : "";
            }, 100);
        }

        function stopSync() { clearInterval(syncInterval); }

        // 輔助工具
        function extractVideoId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function updateStatus(text, bg, color) {
            const tag = document.getElementById('statusTag');
            tag.innerText = text;
            tag.className = `px-3 py-1 rounded-full text-xs font-bold ${bg} ${color}`;
        }

        function setBtnLoading(isLoading) {
            const btn = document.getElementById('btnFetch');
            btn.disabled = isLoading;
            document.getElementById('btnText').innerText = isLoading ? "處理中..." : "抓取字幕";
        }

        function stopSync() { clearInterval(syncInterval); }

        // 樣式連動
        document.getElementById('bgColor').onchange = (e) => document.getElementById('mainBody').style.backgroundColor = e.target.value;
        document.getElementById('fontSize').oninput = (e) => document.getElementById('subtitleText').style.fontSize = e.target.value + 'px';
        document.getElementById('toggleOBS').onclick = () => document.getElementById('mainBody').classList.add('obs-mode');
        window.onkeydown = (e) => { if (e.key === "Escape") document.getElementById('mainBody').classList.remove('obs-mode'); };
    </script>
</body>
</html>
