<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 歌回字幕助手 (UX 優化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .obs-mode .control-panel { display: none; }
        .obs-mode .subtitle-display { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .subtitle-text {
            text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 5px 5px 15px rgba(0,0,0,0.9);
            line-height: 1.3;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }
        #player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        /* 自定義進度條樣式 */
        input[type=range] { cursor: pointer; }
    </style>
</head>
<body id="mainBody" class="bg-[#00FF00] transition-colors duration-500 overflow-hidden text-sm">

    <div id="player-container"></div>

    <div class="control-panel p-6 bg-white/95 shadow-2xl m-4 rounded-2xl border border-gray-200 sticky top-0 z-50 max-w-6xl mx-auto overflow-y-auto max-h-[90vh]">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">🎙️ 歌回同步控制台</h1>
            <div id="statusTag" class="px-4 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-500 shadow-sm">等待指令</div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-4">
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                    <label class="block text-sm font-black text-indigo-700 mb-2">步驟 1：更新影片來源</label>
                    <input type="text" id="ytUrl" placeholder="貼上 YouTube 網址..." class="w-full rounded-lg border-gray-300 border p-2 mb-2 shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button id="btnUpdateVideo" class="w-full py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition shadow-md">
                        載入影片 (Update Video)
                    </button>
                </div>
                
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <label class="block text-sm font-black text-gray-700 mb-2">音量控制</label>
                    <div class="flex items-center gap-3">
                        <span class="text-xs">🔈</span>
                        <input type="range" id="volumeSlider" min="0" max="100" value="50" class="flex-1 h-2 bg-gray-300 rounded-lg appearance-none">
                        <span class="text-xs font-mono" id="volumeVal">50%</span>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-purple-50 p-4 rounded-xl border border-purple-100 h-full">
                    <label class="block text-sm font-black text-purple-700 mb-2">步驟 2：更新歌詞內容</label>
                    
                    <div class="space-y-3">
                        <div class="flex gap-2">
                            <button id="btnAutoFetch" class="flex-1 py-1.5 bg-white border border-purple-300 text-purple-700 rounded-md text-xs font-bold hover:bg-purple-100 transition">自動抓取 CC</button>
                            <input type="file" id="fileInput" class="hidden" accept=".srt,.vtt">
                            <button onclick="document.getElementById('fileInput').click()" class="flex-1 py-1.5 bg-white border border-purple-300 text-purple-700 rounded-md text-xs font-bold hover:bg-purple-100 transition">上傳檔案</button>
                        </div>
                        
                        <div id="trackSelectorArea" class="hidden">
                            <select id="trackSelect" class="w-full rounded-md border-purple-200 border p-1.5 bg-white text-xs"></select>
                        </div>

                        <textarea id="manualText" rows="5" placeholder="在此貼入 LRC 或 SRT 歌詞..." class="w-full rounded-lg border-gray-300 border p-2 text-xs focus:ring-2 focus:ring-purple-500 outline-none font-mono bg-white"></textarea>
                        <button id="btnApplyManual" class="w-full py-2 bg-purple-600 text-white rounded-lg font-bold hover:bg-purple-700 transition">應用歌詞 (Apply)</button>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                    <label class="block text-sm font-black text-green-700 mb-2">步驟 3：同步與播放</label>
                    <div class="flex justify-between items-center mb-1">
                        <span id="timerDisplay" class="text-lg font-black font-mono text-green-800">00:00</span>
                        <span id="durationDisplay" class="text-xs text-gray-500 font-mono">/ 00:00</span>
                    </div>
                    <input type="range" id="progressSlider" min="0" value="0" step="0.1" class="w-full h-3 bg-gray-300 rounded-lg appearance-none mb-4">
                    
                    <div class="grid grid-cols-3 gap-2">
                        <button id="btnPlay" class="py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700">播放</button>
                        <button id="btnPause" class="py-2 bg-yellow-600 text-white rounded font-bold hover:bg-yellow-700">暫停</button>
                        <button id="btnReset" class="py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700">重設</button>
                    </div>
                </div>

                <div class="bg-gray-800 p-4 rounded-xl shadow-inner">
                    <div class="flex gap-4 mb-4">
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-400 font-bold block">字體大小</label>
                            <input type="number" id="fontSize" value="80" class="w-full bg-gray-700 text-white border-none rounded p-1">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-400 font-bold block">背景</label>
                            <select id="bgColor" class="w-full bg-gray-700 text-white border-none rounded p-1 text-xs">
                                <option value="#00FF00">綠</option>
                                <option value="#0000FF">藍</option>
                                <option value="#000000">黑</option>
                            </select>
                        </div>
                    </div>
                    <button id="toggleOBS" class="w-full py-3 bg-white text-gray-900 rounded-xl font-black hover:bg-gray-200 transition-all shadow-lg transform active:scale-95">
                        進入 OBS 模式 (Esc 退出)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="subtitle-display flex items-center justify-center min-h-[50vh] px-12 text-center">
        <div id="subtitleText" class="subtitle-text font-black text-white" style="font-size: 80px;">
            Ready to Stream
        </div>
    </div>

    <script>
        let subtitles = [];
        let player;
        let syncInterval;
        let isDragging = false;

        // --- 1. YouTube Player API ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        function onYouTubeIframeAPIReady() { updateStatus("API 就緒", "bg-blue-100", "text-blue-600"); }

        // 載入影片按鈕 (連動核心)
        document.getElementById('btnUpdateVideo').onclick = () => {
            const videoId = extractVideoId(document.getElementById('ytUrl').value);
            if (!videoId) return alert("請輸入有效的 YouTube 網址");
            initPlayer(videoId);
            updateStatus("影片已更新", "bg-indigo-100", "text-indigo-600");
        };

        function initPlayer(videoId) {
            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('player-container', {
                    videoId: videoId,
                    events: {
                        'onReady': (e) => {
                            e.target.setVolume(document.getElementById('volumeSlider').value);
                            updateDuration();
                        },
                        'onStateChange': (e) => {
                            if (e.data == YT.PlayerState.PLAYING) {
                                startSync();
                                updateDuration();
                            } else { stopSync(); }
                        }
                    }
                });
            }
        }

        // --- 2. 歌詞處理 (三合一) ---
        document.getElementById('btnAutoFetch').onclick = async () => {
            const videoId = extractVideoId(document.getElementById('ytUrl').value);
            if (!videoId) return alert("請先填入 YouTube 網址");
            updateStatus("嘗試抓取...", "bg-yellow-100", "text-yellow-600");
            try {
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.youtube.com/api/timedtext?v=${videoId}&type=list`)}`;
                const res = await fetch(proxy);
                const data = await res.json();
                const xml = new DOMParser().parseFromString(data.contents, "text/xml");
                const tracks = xml.getElementsByTagName('track');
                if (tracks.length === 0) throw new Error("無 CC 字幕");
                const select = document.getElementById('trackSelect');
                select.innerHTML = "";
                Array.from(tracks).forEach(t => select.add(new Option(`${t.getAttribute('lang_original')}`, t.getAttribute('lang_code'))));
                document.getElementById('trackSelectorArea').classList.remove('hidden');
                loadSubtitleTrack(videoId, tracks[0].getAttribute('lang_code'));
            } catch (e) { alert(e.message); }
        };

        document.getElementById('btnApplyManual').onclick = () => {
            const text = document.getElementById('manualText').value;
            subtitles = text.includes('[') ? parseLRC(text) : parseSRT(text);
            if (subtitles.length > 0) {
                updateStatus(`手動歌詞: ${subtitles.length} 句`, "bg-purple-100", "text-purple-600");
            }
        };

        // --- 3. 播放控制與進度條 ---
        document.getElementById('btnPlay').onclick = () => player?.playVideo();
        document.getElementById('btnPause').onclick = () => player?.pauseVideo();
        document.getElementById('btnReset').onclick = () => { player?.seekTo(0); player?.pauseVideo(); };

        document.getElementById('volumeSlider').oninput = (e) => {
            const vol = e.target.value;
            player?.setVolume(vol);
            document.getElementById('volumeVal').innerText = vol + "%";
        };

        const progSlider = document.getElementById('progressSlider');
        progSlider.onmousedown = () => isDragging = true;
        progSlider.onmouseup = () => {
            isDragging = false;
            player?.seekTo(progSlider.value);
        };
        progSlider.oninput = () => {
            document.getElementById('timerDisplay').innerText = formatTime(progSlider.value);
        };

        function startSync() {
            clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                if (!player || isDragging) return;
                const time = player.getCurrentTime();
                progSlider.value = time;
                document.getElementById('timerDisplay').innerText = formatTime(time);
                const cur = subtitles.find(s => time >= s.start && time <= s.end);
                document.getElementById('subtitleText').innerHTML = cur ? cur.text : "";
            }, 100);
        }

        function updateDuration() {
            const d = player.getDuration();
            progSlider.max = d;
            document.getElementById('durationDisplay').innerText = "/ " + formatTime(d);
        }

        // --- 工具函數 ---
        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const m = url.match(regExp); return (m && m[2].length === 11) ? m[2] : url;
        }

        function parseLRC(lrc) {
            const res = [];
            lrc.split('\n').forEach(line => {
                const parts = line.split(']');
                const text = parts.pop().trim();
                const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                if (m) {
                    const s = parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/(m[3].length===3?1000:100);
                    res.push({start: s, end: s + 4, text: text});
                }
            });
            res.sort((a,b)=>a.start-b.start);
            for(let i=0; i<res.length-1; i++) res[i].end = res[i+1].start;
            return res;
        }

        function parseSRT(d) {
            const regex = /(\d+)\n(\d{2}:\d{2}:\d{2}[,\.]\d{3}) --> (\d{2}:\d{2}:\d{2}[,\.]\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
            let res = []; let m;
            while ((m = regex.exec(d.replace(/\r/g, ""))) !== null) {
                res.push({ start: t2s(m[2]), end: t2s(m[3]), text: m[4].replace(/\n/g, "<br>") });
            }
            return res;
        }
        function t2s(t) { const p = t.replace(',', '.').split(':'); return parseFloat(p[0]) * 3600 + parseFloat(p[1]) * 60 + parseFloat(p[2]); }
        function updateStatus(t, b, c) {
            const tag = document.getElementById('statusTag');
            tag.innerText = t; tag.className = `px-4 py-1 rounded-full text-xs font-bold ${b} ${c} shadow-sm`;
        }
        function stopSync() { clearInterval(syncInterval); }

        // 樣式連動
        document.getElementById('bgColor').onchange = (e) => document.getElementById('mainBody').style.backgroundColor = e.target.value;
        document.getElementById('fontSize').oninput = (e) => document.getElementById('subtitleText').style.fontSize = e.target.value + 'px';
        document.getElementById('toggleOBS').onclick = () => document.getElementById('mainBody').classList.add('obs-mode');
        window.onkeydown = (e) => { if (e.key === "Escape") document.getElementById('mainBody').classList.remove('obs-mode'); };
    </script>
</body>
</html>
