<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS YouTube 字幕助手 (專業版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .obs-mode .control-panel { display: none; }
        .obs-mode .subtitle-display { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .subtitle-text {
            text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 5px 5px 15px rgba(0,0,0,0.9);
            line-height: 1.3;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }
        #player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body id="mainBody" class="bg-[#00FF00] transition-colors duration-500 overflow-hidden">

    <div id="player-container"></div>

    <div class="control-panel p-6 bg-white/95 shadow-2xl m-4 rounded-2xl border border-gray-200 sticky top-0 z-50 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black text-gray-800 tracking-tight">🎙️ 歌回/直播 CC 字幕同步器</h1>
            <div id="statusTag" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-500">API 載入中...</div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">1. YouTube 連結 (自動抓取)</label>
                    <div class="flex gap-2 mt-1">
                        <input type="text" id="ytUrl" placeholder="貼上影片網址..." class="flex-1 rounded-lg border-gray-300 border p-2 text-sm shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none">
                        <button id="btnFetch" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700 transition">抓取字幕</button>
                    </div>
                </div>

                <div id="trackSelectorArea" class="hidden animate-pulse">
                    <label class="block text-sm font-bold text-gray-700 text-indigo-600">偵測到字幕！請選擇語言：</label>
                    <select id="trackSelect" class="mt-1 block w-full rounded-lg border-indigo-300 border p-2 bg-indigo-50 text-sm focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"></select>
                </div>

                <div class="pt-2 border-t border-gray-100">
                    <label class="block text-sm font-bold text-gray-500">2. 備案：手動上傳字幕 (.srt / .vtt)</label>
                    <input type="file" id="fileInput" accept=".srt,.vtt" class="mt-1 block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200">
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700">字體大小 (px)</label>
                        <input type="number" id="fontSize" value="80" class="mt-1 block w-full rounded-lg border-gray-300 border p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700">色鍵背景</label>
                        <select id="bgColor" class="mt-1 block w-full rounded-lg border-gray-300 border p-2 text-sm">
                            <option value="#00FF00">綠幕 (Green)</option>
                            <option value="#0000FF">藍幕 (Blue)</option>
                            <option value="#000000">黑色 (Black)</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <span class="text-xs font-mono text-gray-500" id="timerDisplay">00:00.0</span>
                    <button id="toggleOBS" class="px-6 py-2 bg-gray-900 text-white rounded-lg font-black hover:bg-black transition-all shadow-lg text-sm">
                        進入 OBS 擷取模式 (Esc 退出)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="subtitle-display flex items-center justify-center min-h-[60vh] px-12 text-center">
        <div id="subtitleText" class="subtitle-text font-black text-white" style="font-size: 80px;">
            請載入影片或上傳字幕
        </div>
    </div>

    <script>
        let subtitles = [];
        let player;
        let syncInterval;

        // --- 1. YouTube Player API 初始化 ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            updateStatus("API 就緒", "bg-blue-100", "text-blue-600");
        }

        // --- 2. 自動抓取邏輯 (含 Proxy 錯誤處理) ---
        document.getElementById('btnFetch').onclick = async () => {
            const url = document.getElementById('ytUrl').value;
            const videoId = extractVideoId(url);
            if (!videoId) return alert("無效網址");

            setLoading(true);
            try {
                // 嘗試抓取字幕清單
                const metaUrl = `https://www.youtube.com/api/timedtext?v=${videoId}&type=list`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(metaUrl)}`;
                
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                if (!data.contents) throw new Error("無法從代理伺服器取得資料");

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const tracks = xmlDoc.getElementsByTagName('track');

                if (tracks.length === 0) throw new Error("此影片無 CC 字幕，請嘗試手動上傳");

                const trackSelect = document.getElementById('trackSelect');
                trackSelect.innerHTML = "";
                Array.from(tracks).forEach(track => {
                    const option = new Option(`${track.getAttribute('lang_original')} (${track.getAttribute('lang_code')})`, track.getAttribute('lang_code'));
                    trackSelect.add(option);
                });

                document.getElementById('trackSelectorArea').classList.remove('hidden');
                loadSubtitleTrack(videoId, tracks[0].getAttribute('lang_code'));
                initPlayer(videoId);

            } catch (err) {
                console.error(err);
                alert(`自動抓取失敗: ${err.message}\n建議改用手動上傳功能。`);
                initPlayer(videoId); // 雖然字幕抓不到，但仍載入影片以供同步
            } finally {
                setLoading(false);
            }
        };

        async function loadSubtitleTrack(videoId, lang) {
            updateStatus("同步字幕中...", "bg-yellow-100", "text-yellow-600");
            const subUrl = `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${lang}&fmt=srv3`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(subUrl)}`;
            
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const paragraphs = xmlDoc.getElementsByTagName('p');

                subtitles = Array.from(paragraphs).map(p => ({
                    start: parseInt(p.getAttribute('t')) / 1000,
                    end: (parseInt(p.getAttribute('t')) + (parseInt(p.getAttribute('d')) || 2000)) / 1000,
                    text: p.textContent
                }));
                updateStatus("同步成功", "bg-green-100", "text-green-600");
            } catch (e) {
                alert("載入具體字幕內容失敗");
            }
        }

        // --- 3. 手動上傳邏輯 ---
        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                subtitles = parseSRT(event.target.result);
                updateStatus("手動字幕就緒", "bg-purple-100", "text-purple-600");
                alert(`手動字幕載入成功：${subtitles.length} 條`);
            };
            reader.readAsText(e.target.files[0]);
        };

        function parseSRT(data) {
            const regex = /(\d+)\n(\d{2}:\d{2}:\d{2}[,\.]\d{3}) --> (\d{2}:\d{2}:\d{2}[,\.]\d{3})\n([\s\S]*?)(?=\n{2,}|\n*$)/g;
            let res = []; let match;
            const clean = data.replace(/\r/g, "");
            while ((match = regex.exec(clean)) !== null) {
                res.push({
                    start: timeToSeconds(match[2]),
                    end: timeToSeconds(match[3]),
                    text: match[4].replace(/\n/g, "<br>")
                });
            }
            return res;
        }

        function timeToSeconds(t) {
            const p = t.replace(',', '.').split(':');
            return parseFloat(p[0]) * 3600 + parseFloat(p[1]) * 60 + parseFloat(p[2]);
        }

        // --- 4. 同步與控制 ---
        function initPlayer(videoId) {
            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('player-container', {
                    videoId: videoId,
                    events: {
                        'onStateChange': (e) => {
                            if (e.data == YT.PlayerState.PLAYING) startSync();
                            else stopSync();
                        }
                    }
                });
            }
        }

        function startSync() {
            clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                const time = player.getCurrentTime();
                const cur = subtitles.find(s => time >= s.start && time <= s.end);
                document.getElementById('subtitleText').innerHTML = cur ? cur.text : "";
                updateTimerDisplay(time);
            }, 100);
        }

        function stopSync() { clearInterval(syncInterval); }

        function updateTimerDisplay(sec) {
            const m = Math.floor(sec / 60);
            const s = (sec % 60).toFixed(1);
            document.getElementById('timerDisplay').innerText = `${m}:${s.padStart(4, '0')}`;
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function updateStatus(text, bg, color) {
            const tag = document.getElementById('statusTag');
            tag.innerText = text;
            tag.className = `px-3 py-1 rounded-full text-xs font-bold ${bg} ${color}`;
        }

        function setLoading(l) {
            document.getElementById('btnFetch').innerText = l ? "抓取中..." : "抓取字幕";
            document.getElementById('btnFetch').disabled = l;
        }

        // 樣式控制
        document.getElementById('bgColor').onchange = (e) => document.getElementById('mainBody').style.backgroundColor = e.target.value;
        document.getElementById('fontSize').oninput = (e) => document.getElementById('subtitleText').style.fontSize = e.target.value + 'px';
        document.getElementById('toggleOBS').onclick = () => document.getElementById('mainBody').classList.add('obs-mode');
        window.onkeydown = (e) => { if (e.key === "Escape") document.getElementById('mainBody').classList.remove('obs-mode'); };
    </script>
</body>
</html>
